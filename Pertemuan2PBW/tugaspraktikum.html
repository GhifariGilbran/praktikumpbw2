<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Form Data Pengguna</title>
  </head>
  <body>
    <center>
      <form action="" method="GET">
        <table cellpadding="6" border="0">
          <tr>
            <td colspan="2" align="center">
              <h2>Form Data Pengguna</h2>
              <small>Silakan isi data dengan benar</small>
              <hr />
            </td>
          </tr>

          <tr>
            <td>Nama Lengkap</td>
            <td><input type="text" name="nama" placeholder="Nama kamu" /></td>
          </tr>

          <tr>
            <td>Email Aktif</td>
            <td>
              <input type="email" name="email" placeholder="contoh@email.com" />
            </td>
          </tr>

          <tr>
            <td>Kota Domisili</td>
            <td>
              <select name="kota">
                <option>Jakarta</option>
                <option>Karawang</option>
                <option>Bekasi</option>
                <option>Cikarang</option>
              </select>
            </td>
          </tr>

          <tr>
            <td>Jenis Kelamin</td>
            <td>
              <input type="radio" name="jk" value="L" /> Laki-laki
              <input type="radio" name="jk" value="P" /> Perempuan
            </td>
          </tr>

          <tr>
            <td>Hobi</td>
            <td>
              <input type="checkbox" name="hobi[]" value="musik" /> Menari
              <input type="checkbox" name="hobi[]" value="olahraga" /> Olahraga
              <input type="checkbox" name="hobi[]" value="game" /> Game
            </td>
          </tr>

          <tr>
            <td>Catatan</td>
            <td>
              <textarea
                name="catatan"
                rows="3"
                cols="25"
                placeholder="Tulis catatan singkat"
              ></textarea>
            </td>
          </tr>

          <tr>
            <td>Upload Foto</td>
            <td><input type="file" name="foto" /></td>
          </tr>

          <tr>
            <td colspan="2" align="center">
              <input type="submit" value="Daftar" />
              <input type="reset" value="Reset" />
            </td>
          </tr>
        </table>
      </form>
    </center>
  </body>
</html>
